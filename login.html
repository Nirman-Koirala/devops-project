<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4a90e2, #9013fe);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 360px;
      padding: 32px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.15);
    }

    h1 {
      margin: 0 0 24px;
      font-size: 1.75rem;
      text-align: center;
      color: #111;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.95rem;
      color: #4a5568;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 18px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 1rem;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px 14px;
      border: none;
      border-radius: 10px;
      background: #4a90e2;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover {
      background: #3a7dd2;
    }

    .help {
      margin-top: 18px;
      text-align: center;
      font-size: 0.9rem;
      color: #6b7280;
    }

    .help a {
      color: #4a90e2;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome Back</h1>
    <form action="#" method="post">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter your password" required>
      <button type="submit">Sign In</button>
    </form>
    <p class="help">Don't have an account? <a href="#">Sign up</a></p>
  </div>
</body>
</html>
